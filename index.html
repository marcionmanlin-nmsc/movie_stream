<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Streaming Site</title>
  <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/film.svg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid d-flex align-items-center">
      <span class="logo-icon me-2 d-flex align-items-center justify-content-center" aria-label="Movie Icon" title="Movie Icon" style="background:var(--accent);border-radius:50%;width:48px;height:48px;border:3px solid var(--danger);box-shadow:0 2px 8px rgba(0,0,0,0.07);">
        <i class="bi bi-film" style="font-size:2rem;color:#222;"></i>
      </span>
      <h1 class="navbar-brand mb-0" style="font-size:2rem;font-family:'Montserrat',Arial,sans-serif;font-weight:700;letter-spacing:1px;">Movie Stream</h1>
    </div>
  </header>
  <main class="container py-4" style="font-family: 'Roboto', Arial, sans-serif;">
    <section class="row g-4" id="movieGrid">
      <!-- Movie cards will be injected here by script.js -->
    </section>
    <div id="modalPreview" class="modal">
      <div class="modal-content animate__animated animate__fadeInDown">
        <span class="close" id="closeModal">&times;</span>
        <div id="modalBody"></div>
      </div>
    </div>
    <div id="modalInfo" class="modal">
      <div class="modal-content animate__animated animate__fadeInDown">
        <span class="close" id="closeInfoModal">&times;</span>
        <div id="modalInfoBody"></div>
      </div>
    </div>
  </main>
  <footer class="bg-primary text-white text-center py-4 mt-4" style="font-family:'Montserrat',Arial,sans-serif;font-weight:500;letter-spacing:0.5px;">
    <div class="container">
      <div class="d-flex flex-column flex-md-row align-items-center justify-content-center gap-2">
        <span class="me-2"><i class="bi bi-film" style="font-size:1.5rem;color:var(--accent);"></i></span>
        <span>&copy; 2026 Movie Stream. All rights reserved.</span>
      </div>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/animate.css@4.1.1/animate.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
