<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Stream</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="#">
        <span class="logo-icon me-2"><i class="bi bi-camera-reels-fill"></i></span>
        <span class="brand-text">Movie Stream</span>
      </a>
      <form class="d-flex ms-auto" role="search" id="searchForm" onsubmit="return false;">
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
          <input class="form-control border-start-0" type="search" id="searchInput" placeholder="Search movies..." aria-label="Search">
        </div>
      </form>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container py-4">
    <div id="noResults" class="text-center text-muted py-5 d-none">
      <i class="bi bi-emoji-frown" style="font-size:3rem;"></i>
      <p class="mt-2 fs-5">No movies found.</p>
    </div>
    <div class="row g-4" id="movieGrid">
      <!-- Movie cards injected by script.js -->
    </div>
  </main>

  <!-- Info Modal (Bootstrap 5) — shows IMDb details -->
  <div class="modal fade" id="infoModal" tabindex="-1" aria-labelledby="infoModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content rounded-4 shadow-lg">
        <div class="modal-header border-bottom-0">
          <h5 class="modal-title fw-bold" id="infoModalLabel" style="font-family:'Montserrat',sans-serif;">Movie Info</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body" id="infoModalBody">
          <!-- Movie info injected here -->
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-primary text-white text-center py-3 mt-auto">
    <div class="container">
      <span><i class="bi bi-film me-1" style="color:var(--accent);"></i> &copy; 2026 Movie Stream &mdash; Marc Ion Manlin. All rights reserved.</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
